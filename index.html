
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registro Vehículos</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
text-align:center;
width:95%;
max-width:420px;
}

input{
width:92%;
padding:12px;
margin:8px;
border-radius:6px;
border:1px solid #ccc;
font-size:18px;
text-transform:uppercase;
}

button{
padding:15px;
margin-top:10px;
font-size:18px;
border:none;
border-radius:8px;
background:#0078D4;
color:white;
cursor:pointer;
width:95%;
}

video, img{
width:100%;
max-width:350px;
border-radius:10px;
margin-top:10px;
}

.info{
margin-top:8px;
font-size:14px;
color:#555;
}

.estado{
margin-top:10px;
font-weight:bold;
color:green;
}
</style>

</head>

<body>

<div class="container">

<div id="loginSection">
<h2>Ingreso Sistema ZFB</h2>
<input id="username" placeholder="Usuario">
<input type="password" id="password" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>
<div id="loginEstado"></div>
</div>

<div id="appSection" style="display:none">

<h3 id="usuarioLabel"></h3>
<div class="info" id="fechaHora"></div>

<input id="placa" placeholder="Placa vehículo (ABC123)" oninput="validarCambioPlaca()">

<video id="video" autoplay playsinline></video>

<button onclick="tomarFoto()">📷 Tomar Foto</button>

<div class="info" id="contadorFotos">Fotos tomadas: 0</div>

<button onclick="enviarRegistro()" style="background:#28a745">
🚗 Finalizar Registro
</button>

<div class="estado" id="estado"></div>

<img id="preview" style="display:none">

<div id="confirmacion" style="display:none">
<button onclick="confirmarFoto()" style="background:#28a745">✔ Confirmar Foto</button>
<button onclick="repetirFoto()" style="background:#dc3545">🔄 Tomar Otra</button>
</div>

<button onclick="logout()" style="background:#999">Cerrar sesión</button>

</div>

</div>

<script>

const WEBHOOK_LOGIN = "https://n8n.enusa.org/webhook/login"
const WEBHOOK_FOTOS = "https://n8n.enusa.org/webhook/fotos"
const WEBHOOK_REGISTRO = "https://n8n.enusa.org/webhook/crear-registro";
    
const video = document.getElementById("video")
const canvas = document.createElement("canvas")

let fotos = []
let placaActual = ""

function validarCambioPlaca(){
  const placaNueva = document.getElementById("placa").value.trim().toUpperCase()

  if(placaActual && placaNueva !== placaActual){
    fotos = []
    document.getElementById("contadorFotos").innerText = "Fotos tomadas: 0"
    document.getElementById("estado").innerText = "Nueva placa detectada, contador reiniciado"
  }

  placaActual = placaNueva
}

async function login(){

const estado = document.getElementById("loginEstado")
estado.innerText="Validando usuario..."

const user = document.getElementById("username").value.trim()
const pass = document.getElementById("password").value.trim()

if(!user || !pass){
estado.innerText="Ingrese usuario y contraseña"
return
}

try{

const response = await fetch(WEBHOOK_LOGIN,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({usuario:user,password:pass})
})

const data = await response.json()

if(data.login === "ok"){
localStorage.setItem("usuario",user)
mostrarApp(user)
}else{
estado.innerText="Usuario o contraseña incorrectos"
}

}catch{
estado.innerText="Error de conexión"
}
}

function mostrarApp(user){

document.getElementById("loginSection").style.display="none"
document.getElementById("appSection").style.display="block"

document.getElementById("usuarioLabel").innerText="Usuario: "+user

navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(stream=>{video.srcObject=stream})

actualizarFecha()
}

function actualizarFecha(){
const ahora = new Date()
document.getElementById("fechaHora").innerText =
"Fecha: "+ ahora.toLocaleDateString() +
" | Hora: "+ ahora.toLocaleTimeString()
}

async function tomarFoto(){

let placa = document.getElementById("placa").value.trim().toUpperCase()

const regex=/^[A-Z]{3}[0-9]{3}$/

if(placa!=="" && !regex.test(placa)){
alert("Formato placa inválido (ABC123)")
return
}

if(placa===""){placa="NOPLACA"}

canvas.width=video.videoWidth
canvas.height=video.videoHeight

const ctx = canvas.getContext("2d")
ctx.drawImage(video,0,0)

const usuario = localStorage.getItem("usuario")

ctx.fillStyle="yellow"
ctx.font="12px Arial"

ctx.fillText(new Date().toLocaleString(),10,canvas.height-40)
ctx.fillText("USER: "+usuario,10,canvas.height-25)
ctx.fillText("PLACA: "+placa,10,canvas.height-10)

const blob = await new Promise(r=>canvas.toBlob(r,"image/jpeg",0.7))

window.fotoBlob = blob
window.nombreArchivo = placa + "_" + Date.now() + ".jpg"

const preview = document.getElementById("preview")
preview.src = URL.createObjectURL(blob)
preview.style.display = "block"

document.getElementById("confirmacion").style.display = "block"
}

function confirmarFoto(){

fotos.push({
blob:window.fotoBlob,
nombre:window.nombreArchivo
})

document.getElementById("contadorFotos").innerText =
"Fotos tomadas: " + fotos.length

document.getElementById("estado").innerText =
"Foto agregada ("+fotos.length+")"

document.getElementById("preview").style.display="none"
document.getElementById("confirmacion").style.display="none"
}

function repetirFoto(){
document.getElementById("preview").style.display="none"
document.getElementById("confirmacion").style.display="none"
}

async function enviarRegistro(){

const estado=document.getElementById("estado")

if(fotos.length===0){
estado.innerText="Debe tomar al menos una foto"
return
}

let placa = document.getElementById("placa").value.trim().toUpperCase()
if(placa===""){placa="NOPLACA"}

estado.innerText="Enviando fotos..."

const formData=new FormData()

formData.append("placa",placa)
formData.append("usuario",localStorage.getItem("usuario"))

fotos.forEach((f,i)=>{
formData.append("foto"+i,f.blob,f.nombre)
})

await fetch(WEBHOOK_FOTOS,{method:"POST",body:formData})

estado.innerText="Registro guardado ✔"

fotos=[]
placaActual=""

document.getElementById("contadorFotos").innerText="Fotos tomadas: 0"
document.getElementById("placa").value=""
document.getElementById("placa").focus()

actualizarFecha()
}

function logout(){
localStorage.clear()
location.reload()
}

</script>

</body>
</html>
