<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<meta name="theme-color" content="#0078D4">
<title>Registro Vehículos</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        background: #f0f2f5;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 16px;
    }

    .container {
        background: white;
        border-radius: 28px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 500px;
        margin: auto;
        transition: all 0.3s ease;
    }

    h2, h3 {
        margin-bottom: 16px;
        color: #1a1a1a;
        text-align: center;
    }

    input {
        width: 100%;
        padding: 14px;
        margin: 8px 0;
        border-radius: 14px;
        border: 1px solid #ddd;
        font-size: 16px;
        text-transform: uppercase;
        background: #f9f9f9;
        transition: all 0.2s;
        box-sizing: border-box;
    }

    input:focus {
        outline: none;
        border-color: #0078D4;
        background: white;
    }

    button {
        padding: 14px 20px;
        margin-top: 12px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 30px;
        background: #0078D4;
        color: white;
        cursor: pointer;
        width: 100%;
        transition: transform 0.1s, background 0.2s;
    }

    button:active {
        transform: scale(0.98);
    }

    button:disabled {
        background: #999;
        transform: none;
    }

    /* Secciones que se muestran/ocultan */
    .section {
        transition: all 0.3s ease;
    }

    .camera-section {
        margin: 16px 0;
    }

    .camera-container {
        position: relative;
        width: 100%;
        border-radius: 20px;
        overflow: hidden;
        background: #000;
        touch-action: pinch-zoom;
    }

    video {
        width: 100%;
        height: auto;
        display: block;
    }

    .zoom-controls {
        position: absolute;
        bottom: 16px;
        right: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        z-index: 10;
    }

    .zoom-btn {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(4px);
        color: white;
        font-size: 24px;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        margin: 0;
        padding: 0;
    }

    .zoom-btn:active {
        background: rgba(0,0,0,0.8);
        transform: scale(0.95);
    }

    .zoom-indicator {
        position: absolute;
        bottom: 16px;
        left: 16px;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(4px);
        padding: 6px 12px;
        border-radius: 30px;
        color: white;
        font-size: 12px;
        font-weight: 500;
        z-index: 10;
    }

    /* Sección de confirmación de foto */
    .confirm-section {
        text-align: center;
        margin: 16px 0;
    }

    .confirm-img {
        width: 100%;
        border-radius: 20px;
        border: 2px solid #ddd;
        margin-bottom: 16px;
    }

    .confirm-buttons {
        display: flex;
        gap: 12px;
    }

    .confirm-buttons button {
        flex: 1;
        margin: 0;
    }

    .btn-confirm {
        background: #28a745;
    }

    .btn-retake {
        background: #dc3545;
    }

    .info {
        margin: 8px 0;
        font-size: 13px;
        color: #666;
        text-align: center;
    }

    .estado, .loginEstado {
        margin-top: 12px;
        font-weight: 500;
        font-size: 14px;
        text-align: center;
    }

    .estado { color: #28a745; }
    .loginEstado { color: #dc3545; }

    .btn-logout {
        background: #6c757d;
        margin-top: 16px;
    }

    .counter {
        background: #f0f2f5;
        padding: 8px 16px;
        border-radius: 30px;
        display: inline-block;
        margin: 8px auto;
        font-size: 14px;
        font-weight: 500;
    }

    .hidden {
        display: none;
    }
</style>
</head>
<body>

<div class="container">
    <!-- Login Section -->
    <div id="loginSection" class="section">
        <h2>🔐 Ingreso</h2>
        <input id="username" placeholder="Usuario" autocomplete="off">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="login()">Ingresar</button>
        <div id="loginEstado" class="loginEstado"></div>
    </div>

    <!-- App Section -->
    <div id="appSection" class="section" style="display:none">
        <h3 id="usuarioLabel"></h3>
        <div class="info" id="fechaHora"></div>
        
        <input id="placa" placeholder="Placa (ABC123)" autocomplete="off">
        
        <!-- Sección de cámara (visible cuando se toman fotos) -->
        <div id="cameraSection" class="camera-section">
            <div class="camera-container">
                <video id="video" autoplay playsinline></video>
                <div class="zoom-controls">
                    <button class="zoom-btn" id="zoomIn" onclick="zoomIn()">+</button>
                    <button class="zoom-btn" id="zoomOut" onclick="zoomOut()">-</button>
                </div>
                <div class="zoom-indicator" id="zoomIndicator">1x</div>
            </div>
            <button id="btnFoto" onclick="tomarFoto()">📸 Tomar Foto</button>
        </div>
        
        <!-- Sección de confirmación de foto (visible después de tomar foto) -->
        <div id="confirmSection" class="confirm-section hidden">
            <img id="previewImg" class="confirm-img">
            <div class="confirm-buttons">
                <button class="btn-confirm" onclick="confirmarFoto()">✔ Confirmar</button>
                <button class="btn-retake" onclick="repetirFoto()">🔄 Repetir</button>
            </div>
        </div>
        
        <div class="info">
            <span class="counter" id="contadorFotos">📷 Fotos: 0</span>
        </div>
        
        <button onclick="enviarRegistro()" style="background:#28a745">
            🚗 Finalizar Registro
        </button>
        
        <div class="estado" id="estado"></div>
        
        <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
</div>

<script>
const WEBHOOK_LOGIN = "https://unmeretriciously-clinographic-marlyn.ngrok-free.dev/webhook/login1"
const WEBHOOK_FOTOS = "https://unmeretriciously-clinographic-marlyn.ngrok-free.dev/webhook/fotos1"

const video = document.getElementById("video")
const canvas = document.createElement("canvas")
let fotos = []
let currentZoom = 1
let stream = null
let fotoPendiente = null
let nombreArchivoPendiente = null

// Zoom functions
function applyZoom() {
    if (video) {
        video.style.transform = `scale(${currentZoom})`
    }
    const indicator = document.getElementById('zoomIndicator')
    if (indicator) indicator.innerText = `${currentZoom.toFixed(1)}x`
}

function zoomIn() {
    if (currentZoom < 3) {
        currentZoom = Math.min(3, currentZoom + 0.2)
        applyZoom()
    }
}

function zoomOut() {
    if (currentZoom > 1) {
        currentZoom = Math.max(1, currentZoom - 0.2)
        applyZoom()
    }
}

// Reset zoom
function resetZoom() {
    currentZoom = 1
    applyZoom()
}

// Tomar foto - oculta cámara, muestra confirmación
async function tomarFoto() {
    const estado = document.getElementById("estado")
    let placa = document.getElementById("placa").value.trim().toUpperCase()
    const regex = /^[A-Z]{3}[0-9]{3}$/

    if (placa !== "" && !regex.test(placa)) {
        alert("Formato placa inválido (ABC123)")
        return
    }
    if (placa === "") placa = "NOPLACA"

    // Capturar el frame actual
    canvas.width = video.videoWidth
    canvas.height = video.videoHeight
    const ctx = canvas.getContext("2d")
    
    // Aplicar zoom si es necesario
    if (currentZoom > 1) {
        const centerX = video.videoWidth / 2
        const centerY = video.videoHeight / 2
        const cropWidth = video.videoWidth / currentZoom
        const cropHeight = video.videoHeight / currentZoom
        ctx.drawImage(video, centerX - cropWidth/2, centerY - cropHeight/2, cropWidth, cropHeight, 0, 0, canvas.width, canvas.height)
    } else {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height)
    }

    const ahora = new Date()
    const fecha = ahora.toLocaleDateString()
    const hora = ahora.toLocaleTimeString()
    const usuario = localStorage.getItem("usuario")

    // Agregar datos a la foto
    ctx.font = "12px Arial"
    ctx.fillStyle = "yellow"
    ctx.strokeStyle = "black"
    ctx.lineWidth = 3

    ctx.strokeText(fecha + " " + hora, 10, canvas.height-45)
    ctx.fillText(fecha + " " + hora, 10, canvas.height-45)
    ctx.strokeText("USER: " + usuario, 10, canvas.height-25)
    ctx.fillText("USER: " + usuario, 10, canvas.height-25)
    ctx.strokeText("PLACA: " + placa, 10, canvas.height-5)
    ctx.fillText("PLACA: " + placa, 10, canvas.height-5)

    const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/jpeg", 0.7))
    const nombreArchivo = placa + "_" + formatearFechaArchivo() + ".jpg"

    // Guardar foto pendiente
    fotoPendiente = { blob, nombre: nombreArchivo }
    nombreArchivoPendiente = nombreArchivo

    // Mostrar preview
    const previewImg = document.getElementById("previewImg")
    previewImg.src = URL.createObjectURL(blob)
    
    // Ocultar cámara, mostrar confirmación
    document.getElementById("cameraSection").classList.add("hidden")
    document.getElementById("confirmSection").classList.remove("hidden")
    
    estado.innerText = "Revise la foto antes de confirmar"
}

// Confirmar foto - guarda y vuelve a mostrar cámara
function confirmarFoto() {
    if (fotoPendiente) {
        fotos.push(fotoPendiente)
        document.getElementById("contadorFotos").innerHTML = `📷 Fotos: ${fotos.length}`
        document.getElementById("estado").innerText = `✅ Foto ${fotos.length} agregada`
        
        // Limpiar pendiente
        fotoPendiente = null
        nombreArchivoPendiente = null
        
        // Ocultar confirmación, mostrar cámara
        document.getElementById("confirmSection").classList.add("hidden")
        document.getElementById("cameraSection").classList.remove("hidden")
        
        // Reset zoom
        resetZoom()
        
        // Limpiar mensaje después de 2 segundos
        setTimeout(() => {
            if (document.getElementById("estado").innerText.includes("agregada")) {
                document.getElementById("estado").innerText = ""
            }
        }, 2000)
    }
}

// Repetir foto - solo vuelve a cámara sin guardar
function repetirFoto() {
    fotoPendiente = null
    nombreArchivoPendiente = null
    
    document.getElementById("confirmSection").classList.add("hidden")
    document.getElementById("cameraSection").classList.remove("hidden")
    document.getElementById("estado").innerText = "Tome otra foto"
    
    resetZoom()
    
    setTimeout(() => {
        if (document.getElementById("estado").innerText === "Tome otra foto") {
            document.getElementById("estado").innerText = ""
        }
    }, 2000)
}

function formatearFechaArchivo() {
    const ahora = new Date()
    const yyyy = ahora.getFullYear()
    const mm = String(ahora.getMonth()+1).padStart(2,'0')
    const dd = String(ahora.getDate()).padStart(2,'0')
    const hh = String(ahora.getHours()).padStart(2,'0')
    const min = String(ahora.getMinutes()).padStart(2,'0')
    const ss = String(ahora.getSeconds()).padStart(2,'0')
    return `${yyyy}-${mm}-${dd}_${hh}-${min}-${ss}`
}

async function login() {
    const estado = document.getElementById("loginEstado")
    estado.innerText = "Validando..."
    const user = document.getElementById("username").value.trim()
    const pass = document.getElementById("password").value.trim()
    if (!user || !pass) {
        estado.innerText = "Ingrese usuario y contraseña"
        return
    }
    try {
        const response = await fetch(WEBHOOK_LOGIN, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ usuario: user, password: pass })
        })
        const data = await response.json()
        if (data.login === "ok") {
            localStorage.setItem("usuario", user)
            localStorage.setItem("loginTime", Date.now())
            mostrarApp(user)
        } else {
            estado.innerText = "Usuario o contraseña incorrectos"
        }
    } catch (error) {
        estado.innerText = "Error de conexión"
    }
}

function mostrarApp(user) {
    document.getElementById("loginSection").style.display = "none"
    document.getElementById("appSection").style.display = "block"
    document.getElementById("usuarioLabel").innerHTML = "👤 " + user
    actualizarFecha()
    
    // Asegurar que la cámara esté visible
    document.getElementById("cameraSection").classList.remove("hidden")
    document.getElementById("confirmSection").classList.add("hidden")
    
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(s => {
            stream = s
            video.srcObject = stream
            resetZoom()
        })
        .catch(err => console.error("Error accessing camera:", err))
}

function actualizarFecha() {
    const ahora = new Date()
    document.getElementById("fechaHora").innerHTML = 
        "📅 " + ahora.toLocaleDateString() + " | ⏰ " + ahora.toLocaleTimeString()
}

async function enviarRegistro() {
    const estado = document.getElementById("estado")
    if (fotos.length === 0) {
        estado.innerText = "Debe tomar al menos una foto"
        return
    }
    estado.innerText = "Enviando fotos..."
    const formData = new FormData()
    let placa = document.getElementById("placa").value.trim().toUpperCase()
    if (placa === "") placa = "NOPLACA"
    formData.append("placa", placa)
    formData.append("usuario", localStorage.getItem("usuario"))
    formData.append("fecha", new Date().toISOString())
    formData.append("totalFotos", fotos.length)
    fotos.forEach((f, i) => {
        formData.append("foto" + i, f.blob, f.nombre)
    })
    try {
        await fetch(WEBHOOK_FOTOS, { method: "POST", body: formData })
        estado.innerText = "✅ Registro guardado"
        fotos = []
        document.getElementById("contadorFotos").innerHTML = "📷 Fotos: 0"
        document.getElementById("placa").value = ""
        document.getElementById("placa").focus()
        actualizarFecha()
        setTimeout(() => estado.innerText = "", 3000)
    } catch (error) {
        estado.innerText = "❌ Error al enviar"
    }
}

function logout() {
    if (stream) {
        stream.getTracks().forEach(track => track.stop())
    }
    localStorage.clear()
    location.reload()
}

// Touch zoom support
let initialDistance = 0
if (video) {
    video.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            initialDistance = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            )
        }
    })
    video.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2 && initialDistance > 0) {
            e.preventDefault()
            const newDistance = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            )
            const delta = newDistance / initialDistance
            let newZoom = currentZoom * delta
            newZoom = Math.min(3, Math.max(1, newZoom))
            if (newZoom !== currentZoom) {
                currentZoom = newZoom
                applyZoom()
            }
            initialDistance = newDistance
        }
    })
    video.addEventListener('touchend', () => {
        initialDistance = 0
    })
}
</script>
</body>
</html>
